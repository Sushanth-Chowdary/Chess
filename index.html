<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="box">
        <div class="notation numbers">
            <div>8</div><div>7</div><div>6</div><div>5</div>
            <div>4</div><div>3</div><div>2</div><div>1</div>
        </div>

        <div class="chess-board">
            <div class="row row-even" id="8">
                <div id="A8"></div><div id="B8"></div><div id="C8"></div><div id="D8"></div>
                <div id="E8"></div><div id="F8"></div><div id="G8"></div><div id="H8"></div>
            </div>
            <div class="row row-odd" id="7">
                <div id="A7"></div><div id="B7"></div><div id="C7"></div><div id="D7"></div>
                <div id="E7"></div><div id="F7"></div><div id="G7"></div><div id="H7"></div>
            </div>
            <div class="row row-even" id="6">
                <div id="A6"></div><div id="B6"></div><div id="C6"></div><div id="D6"></div>
                <div id="E6"></div><div id="F6"></div><div id="G6"></div><div id="H6"></div>
            </div>
            <div class="row row-odd" id="5">
                <div id="A5"></div><div id="B5"></div><div id="C5"></div><div id="D5"></div>
                <div id="E5"></div><div id="F5"></div><div id="G5"></div><div id="H5"></div>
            </div>
            <div class="row row-even" id="4">
                <div id="A4"></div><div id="B4"></div><div id="C4"></div><div id="D4"></div>
                <div id="E4"></div><div id="F4"></div><div id="G4"></div><div id="H4"></div>
            </div>
            <div class="row row-odd" id="3">
                <div id="A3"></div><div id="B3"></div><div id="C3"></div><div id="D3"></div>
                <div id="E3"></div><div id="F3"></div><div id="G3"></div><div id="H3"></div>
            </div>
            <div class="row row-even" id="2">
                <div id="A2"></div><div id="B2"></div><div id="C2"></div><div id="D2"></div>
                <div id="E2"></div><div id="F2"></div><div id="G2"></div><div id="H2"></div>
            </div>
            <div class="row row-odd" id="1">
                <div id="A1"></div><div id="B1"></div><div id="C1"></div><div id="D1"></div>
                <div id="E1"></div><div id="F1"></div><div id="G1"></div><div id="H1"></div>
            </div>
        </div>

        <div class="corner-empty"></div>

        <div class="notation letters">
            <div>A</div><div>B</div><div>C</div><div>D</div>
            <div>E</div><div>F</div><div>G</div><div>H</div>
        </div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
